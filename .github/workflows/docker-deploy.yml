name: Local Docker CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    # 1. Скачиваем свежий код
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Настраиваем Node.js на вашем ПК для прогона тестов
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Устанавливаем зависимости и запускаем встроенные тесты
    - name: Install dependencies & Run Tests
      run: |
        npm ci
        npm test
      working-directory: ${{ github.workspace }}/src
      continue-on-error: true

    # 4. Сборка и запуск всей инфраструктуры (App + MongoDB) через Docker Compose
    - name: Deploy with Docker Compose
      run: |
        docker compose down
        docker compose up -d --build
      working-directory: ${{ github.workspace }}
